<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Pop! Desktop Parody</title>
  <style>
    :root {
      --bg: #7cc7ff;
      --panel: #f4f8ff;
      --ink: #1d2b53;
      --mint: #72f2cb;
      --pink: #ff9fca;
      --yellow: #ffe38a;
      --danger: #ff7575;
      --ok: #59cc7f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, #93d5ff, #73c2ff 45%, #65b4ff);
      min-height: 100vh;
      overflow: hidden;
    }
    .desktop {
      display: grid;
      grid-template-rows: 1fr 44px;
      height: 100vh;
      padding: 18px 18px 0;
      gap: 12px;
    }
    .window {
      border: 3px solid #254b91;
      border-radius: 10px;
      background: #dce9ff;
      box-shadow: 0 14px 25px rgba(7, 32, 81, 0.25);
      display: grid;
      grid-template-rows: 36px 1fr;
      overflow: hidden;
    }
    .titlebar {
      background: linear-gradient(90deg, #2f5fb7, #5684df);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    .win-controls { display: flex; gap: 6px; }
    .ctrl {
      width: 14px; height: 14px; border: 2px solid #fff; border-radius: 3px;
      background: rgba(255,255,255,0.3);
    }
    .workspace {
      display: grid;
      grid-template-columns: 2.2fr 1fr;
      gap: 10px;
      padding: 10px;
      background: #c9dbff;
      min-height: 0;
    }
    .panel {
      background: var(--panel);
      border: 2px solid #8fb2f2;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(90px,1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .kpi {
      background: #fff;
      border: 2px solid #b3caf6;
      border-radius: 8px;
      padding: 6px;
      text-align: center;
      font-size: 13px;
    }
    .kpi strong { display: block; font-size: 20px; }
    .layout-rows {
      display: grid;
      grid-template-rows: 1fr 140px;
      gap: 10px;
      min-height: 0;
    }
    .guest-list {
      overflow: auto;
      display: grid;
      gap: 8px;
      align-content: start;
      padding-right: 4px;
    }
    .guest {
      background: white;
      border: 2px solid #bcd0f7;
      border-radius: 10px;
      padding: 8px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .avatar { font-size: 24px; }
    .needs { font-size: 12px; }
    .timer {
      width: 68px;
      text-align: right;
      font-weight: 700;
      color: #315694;
    }
    .bar {
      height: 7px;
      border-radius: 999px;
      background: #e8efff;
      overflow: hidden;
      margin-top: 4px;
    }
    .bar > i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg,var(--ok),var(--yellow),var(--danger));
      transform-origin: left;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px,1fr));
      gap: 8px;
    }
    button {
      border: 2px solid #24498d;
      border-radius: 8px;
      padding: 8px;
      background: linear-gradient(#fff,#dce8ff);
      cursor: pointer;
      font-weight: 700;
      color: #1f3a6f;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px); }
    .shop button { width: 100%; margin-bottom: 7px; text-align: left; }
    .log {
      flex: 1;
      overflow: auto;
      background: #fff;
      border: 2px solid #bed0f4;
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
      line-height: 1.4;
    }
    .taskbar {
      background: #2f5fb7;
      color: white;
      border-top: 3px solid #264d94;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      font-weight: 700;
    }
    .start {
      background: #59cc7f;
      color: #13341f;
      border: 2px solid #173d24;
      border-radius: 6px;
      padding: 3px 12px;
    }
    .toast {
      position: fixed;
      right: 20px;
      top: 20px;
      background: #fff;
      border: 2px solid #2c55a5;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      animation: pop 1.5s ease forwards;
      box-shadow: 0 8px 20px rgba(33, 74, 148, 0.2);
    }
    @keyframes pop {
      0% { opacity: 0; transform: translateY(-8px) scale(0.95); }
      10%,80% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-8px) scale(0.95); }
    }
    @media (max-width: 1100px) {
      .workspace { grid-template-columns: 1fr; }
      .actions { grid-template-columns: repeat(2,1fr); }
      .kpis { grid-template-columns: repeat(3,1fr); }
    }
  </style>
</head>
<body>
  <div class="desktop">
    <div class="window">
      <div class="titlebar">
        <span>🏨 Hotel Pop! Manager 98 - Totally Original Ops Suite</span>
        <div class="win-controls"><span class="ctrl"></span><span class="ctrl"></span><span class="ctrl"></span></div>
      </div>
      <div class="workspace">
        <section class="panel">
          <div class="kpis">
            <div class="kpi">Day<strong id="day">1</strong></div>
            <div class="kpi">Coins<strong id="coins">120</strong></div>
            <div class="kpi">Reputation<strong id="rep">100</strong></div>
            <div class="kpi">Combo<strong id="combo">x1</strong></div>
            <div class="kpi">Energy<strong id="energy">10</strong></div>
            <div class="kpi">Time<strong id="time">45</strong></div>
          </div>
          <div class="layout-rows">
            <div class="panel" style="padding:8px;">
              <strong>Guest Queue</strong>
              <div id="guests" class="guest-list"></div>
            </div>
            <div class="panel">
              <strong>Quick Actions</strong>
              <div class="actions">
                <button data-action="checkin">🛎️ Speed Check-in</button>
                <button data-action="clean">🧼 Turbo Clean</button>
                <button data-action="snack">🧁 Snack Drop</button>
                <button data-action="decor">🌸 Decor Burst</button>
              </div>
            </div>
          </div>
        </section>
        <aside class="panel shop">
          <strong>Upgrades</strong>
          <button data-upgrade="desk">+ Reception Bot (70)</button>
          <button data-upgrade="house">+ Housekeeping Drone (80)</button>
          <button data-upgrade="cart">+ Snack Cart Deluxe (65)</button>
          <button data-upgrade="aura">+ Cute Lobby Aura (90)</button>
          <strong>Event Log</strong>
          <div id="log" class="log"></div>
        </aside>
      </div>
    </div>
    <div class="taskbar">
      <span class="start">★ START</span>
      <span id="clock">09:00</span>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
